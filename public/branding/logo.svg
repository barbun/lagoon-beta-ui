<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40">
  <defs>
    <style>
      .logo-shape { fill: #0891b2; }
      .logo-text { fill: #1e293b; font-family: system-ui, sans-serif; font-weight: 600; font-size: 20px; }
